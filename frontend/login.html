<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · TalentScope</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
</head>

<body class="auth-body">
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <div class="auth-wrap">
    <div class="auth-card glass">
      <a href="index.html" class="brand auth-brand">
        <span class="brand-mark">🎯</span>
        <span class="brand-text"><strong>TalentScope</strong></span>
      </a>
      <h1 class="auth-title">Welcome back 👋</h1>
      <p class="muted auth-sub">Log in to access your recruitment dashboard.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
          <small class="error-msg" data-error-for="email"></small>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" data-toggle="password" aria-label="Show password">👁️</button>
          </div>
          <small class="error-msg" data-error-for="password"></small>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="remember" name="remember" />
          <span>Remember me for 7 days</span>
        </label>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <span class="btn-text">Log In</span>
        </button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
      <p class="auth-demo muted">
        Demo: <strong>priya@example.com</strong> / <strong>Password@123</strong>
      </p>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
